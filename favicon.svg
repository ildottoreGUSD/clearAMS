<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A" />
      <stop offset="100%" stop-color="#151B2C" />
    </linearGradient>
    
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <g opacity="0.03" stroke="#FFFFFF" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <g>
    <path d="M 369 143 A 160 160 0 1 0 369 369" fill="none" stroke="url(#cGrad)" stroke-width="32" stroke-linecap="round" filter="url(#glow)" />
    
    <path d="M 175 345 L 256 155 L 337 345" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <circle cx="256" cy="256" r="125" fill="url(#glassGrad)" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" />

  <g filter="url(#dropShadow)">
    <path d="M 209 265 L 265 315 L 385 145" fill="none" stroke="url(#checkGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>
</svg>
