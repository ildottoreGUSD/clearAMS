const API = {
  async post(path, body) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
      body: JSON.stringify(body),
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
  async get(path) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
};

  const abs = Math.abs(Math.round(n)).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
  return n < 0 ? "−" + abs : abs;
};
const fmtPct = (n, d=1) => `${(n*100).toFixed(d)}%`;

function I({ name, size=16, strokeWidth=1.75, className="" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const el = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Square);
    el.setAttribute("width",  size);
    el.setAttribute("height", size);
    el.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(el);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} aria-hidden="true" />;
}

function AnimNum({ value, format=(v=>v), duration=420, className, style }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  const t0Ref   = useRef(0);
  useEffect(() => {
    fromRef.current = disp;
    t0Ref.current   = performance.now();
    let raf;
    const tick = (t) => {
      const k     = Math.min(1, (t - t0Ref.current) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setDisp(fromRef.current + (value - fromRef.current) * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <span className={className} style={style}>{format(disp)}</span>;
}

function AllocationRing({ pct, size=96, schoolKey, yearKey }) {
  const arcRef    = useRef(null);
  const r         = (size - 14) / 2;
  const circ      = 2 * Math.PI * r;
  const overspent = pct > 1;
  const color     = overspent ? "#DC2626" : pct > 0.92 ? "#B45309" : "#15803D";

  useEffect(() => {
    if (!arcRef.current || typeof gsap === "undefined") return;
    const target = circ * (1 - Math.min(pct, 1));
    gsap.fromTo(arcRef.current,
      { strokeDashoffset: circ },
      { strokeDashoffset: target, duration: 1.5, ease: "expo.out", delay: 0.25 }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8EFF7" strokeWidth={11} />
        <circle ref={arcRef} cx={size/2} cy={size/2} r={r}
          fill="none" stroke={color} strokeWidth={11} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
        <div className="mono" style={{ fontSize:13, fontWeight:700, color, lineHeight:1 }}>
          {fmtPct(Math.min(pct, 9.99))}
        </div>
        <div style={{ fontSize:8.5, color:"var(--muted)", marginTop:2, letterSpacing:".05em", textTransform:"uppercase" }}>used</div>
      </div>
    </div>
  );
}

// ── Animated horizontal budget bar ────────────────────────────────────────────
function BudgetBar({ label, share, budget, expended, accent, schoolKey, yearKey, delay=0 }) {
  const fillRef    = useRef(null);
  const pct        = budget > 0 ? expended / budget : 0;
  const overBudget = expended > budget;
  const remaining  = budget - expended;
  const fillColor  = overBudget ? "#DC2626" : accent;

  useEffect(() => {
    if (!fillRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(fillRef.current,
      { scaleX: 0 },
      { scaleX: Math.min(pct, 1), duration: 1.25, ease: "expo.out",
        transformOrigin: "left center", delay }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:7 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <span style={{ width:8, height:8, borderRadius:"50%", background:accent, flexShrink:0, display:"inline-block" }} />
          <span style={{ fontSize:11, fontWeight:700, letterSpacing:".07em", textTransform:"uppercase", color:"var(--ink-2)" }}>
            {label}
          </span>
          <span style={{ fontSize:10, color:"var(--muted)", background:"var(--line-2)", borderRadius:4,
            padding:"1px 6px", fontWeight:600 }}>
            {share}%
          </span>
        </div>
        <span className="mono" style={{ fontSize:12, fontWeight:600, color:"var(--ink)" }}>{fmt$(budget)}</span>
      </div>

      <div style={{ height:10, background:"#EDF0F5", borderRadius:999, overflow:"hidden",
        border:"1px solid var(--line)", position:"relative" }}>
        <div ref={fillRef} style={{
          position:"absolute", top:0, bottom:0, left:0, right:0,
          background:fillColor, borderRadius:999,
          boxShadow:"inset 0 1px 0 rgba(255,255,255,.4)",
          transform:"scaleX(0)", transformOrigin:"left center",
        }} />
        {overBudget && (
          <div style={{ position:"absolute", inset:0,
            background:"repeating-linear-gradient(90deg,rgba(220,38,38,.18) 0 4px,transparent 4px 8px)" }} />
        )}
      </div>

      <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
        <span style={{ fontSize:11 }}>
          <span className="mono" style={{ fontWeight:600, color: overBudget ? "var(--red)" : "var(--ink)" }}>
            <AnimNum value={expended} format={fmt$} />
          </span>
          <span style={{ color:"var(--muted)", marginLeft:4 }}>expended</span>
        </span>
        <span style={{ fontSize:11 }}>
          <span className="mono" style={{ fontWeight:600,
            color: remaining<0?"var(--red)": remaining<budget*.08?"var(--amber)":"var(--ink-2)" }}>
            {remaining>=0?"":"−"}{fmt$(Math.abs(remaining))}
          </span>
          <span style={{ color:"var(--muted)", marginLeft:4 }}>{remaining>=0?"remaining":"over"}</span>
        </span>
      </div>
    </div>
  );
}

// ── Year column ───────────────────────────────────────────────────────────────
function YearColumn({ yearMeta, school, colWidth, animDelay=0 }) {
  const colRef = useRef(null);
  const { key, label, status, fileName, importedOn } = yearMeta;
  const data       = school[key];
  const isCurrent  = status === "current";
  const { allocation, staffingBudget, suppliesBudget, totalExp } = data;
  const staffExp   = Math.round(totalExp * 0.80);
  const suppExp    = totalExp - staffExp;
  const remaining  = allocation - totalExp;
  const usagePct   = allocation > 0 ? totalExp / allocation : 0;

  const sc = isCurrent
    ? { bg:"var(--blue-soft)",  text:"var(--blue)",  dot:"#1D4ED8", anim:true  }
    : { bg:"var(--green-soft)", text:"var(--green)", dot:"#15803D", anim:false };

  useEffect(() => {
    if (!colRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(colRef.current,
      { opacity:0, y:28 },
      { opacity:1, y:0, duration:0.75, ease:"expo.out", delay:animDelay }
    );
  }, [school.id]);

  return (
    <div ref={colRef} style={{ width:colWidth, flexShrink:0, opacity:0 }}>
      {/* Column header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:20 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, color:"var(--ink)", letterSpacing:"-.015em", lineHeight:1 }}>{label}</div>
          <div className="mono" style={{ display:"flex", alignItems:"center", gap:6, marginTop:7, fontSize:10.5, color:"var(--muted)" }}>
            <I name="FileSpreadsheet" size={11} /> {fileName}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, borderRadius:999, padding:"5px 11px",
          background:sc.bg, fontSize:10.5, fontWeight:600, color:sc.text, flexShrink:0, marginTop:2 }}>
          <span className={sc.anim ? "live-dot" : ""} style={{ width:5, height:5, borderRadius:"50%", background:sc.dot, display:"inline-block" }} />
          {isCurrent ? "Live" : "Final"}
        </div>
      </div>

      {/* Allocation card with ring */}
      <div className="card" style={{ padding:"20px 22px", marginBottom:14, display:"flex", alignItems:"center", gap:18 }}>
        <AllocationRing pct={usagePct} size={96} schoolKey={school.id} yearKey={key} />
        <div style={{ minWidth:0 }}>
          <div className="eyebrow" style={{ marginBottom:5 }}>Starting Allocation</div>
          <div className="serif" style={{ fontSize:28, lineHeight:1, color:"var(--ink)", marginBottom:7 }}>
            <AnimNum value={allocation} format={fmt$} />
          </div>
          <div style={{ fontSize:11.5 }}>
            <span className="mono" style={{ fontWeight:700,
              color: usagePct>1?"var(--red)": usagePct>0.92?"var(--amber)":"var(--ink-2)" }}>
              {fmtPct(usagePct)}
            </span>
            <span style={{ color:"var(--muted)", marginLeft:5 }}>utilized</span>
          </div>
          <div style={{ fontSize:10.5, color:"var(--muted)", marginTop:3 }}>
            <span style={{ fontWeight:600, color:"var(--ink-2)" }}>80%</span> staffing ·{" "}
            <span style={{ fontWeight:600, color:SUPPLIES_ACCENT }}>20%</span> supplies
          </div>
        </div>
      </div>

      {/* Budget bars */}
      <div className="card" style={{ padding:"20px 22px", marginBottom:14 }}>
        <BudgetBar label="Staffing" share={80} budget={staffingBudget} expended={staffExp}
          accent={STAFFING_ACCENT} schoolKey={school.id} yearKey={key} delay={0.35} />
        <BudgetBar label="Supplies" share={20} budget={suppliesBudget} expended={suppExp}
          accent={SUPPLIES_ACCENT} schoolKey={school.id} yearKey={key} delay={0.55} />
      </div>

      {/* Totals */}
      <div className="card overflow-hidden">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
          <div style={{ padding:"16px 20px" }}>
            <div className="eyebrow" style={{ fontSize:9 }}>Total Expended</div>
            <div className="mono" style={{ fontSize:17, fontWeight:700, color:"var(--ink)", marginTop:5, letterSpacing:"-.01em" }}>
              <AnimNum value={totalExp} format={fmt$} />
            </div>
            <div className="mono" style={{ fontSize:10, color:"var(--muted)", marginTop:4 }}>
              {fmtPct(totalExp/allocation)} of allocation
            </div>
          </div>
          <div style={{ padding:"16px 20px", borderLeft:"1px solid var(--line)" }}>
            <div className="eyebrow" style={{ fontSize:9 }}>Remaining</div>
            <div className="mono" style={{ fontSize:17, fontWeight:700, marginTop:5, letterSpacing:"-.01em",
              color: remaining<0?"var(--red)": remaining<allocation*.05?"var(--amber)":"var(--green)" }}>
              <AnimNum value={remaining} format={fmt$} />
            </div>
            {isCurrent
              ? <div style={{ fontSize:10, color:"var(--muted)", marginTop:4 }}>through Jun 30, 2026</div>
              : <div style={{ fontSize:10, color:remaining<0?"var(--red)":"var(--green)", marginTop:4 }}>
                  {remaining<0?"overspent":"unspent / returned"}
                </div>
            }
          </div>
        </div>
      </div>

      <div style={{ marginTop:12, display:"flex", alignItems:"center", gap:6, fontSize:10.5, color:"var(--muted)" }}>
        <I name="Clock" size={10} /> Imported {importedOn}
      </div>
    </div>
  );
}

// ── Sign-In screen ───────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [shaking,  setShaking]  = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const shake = () => {
    setShaking(true);
    setTimeout(() => setShaking(false), 450);
  };

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    const res = await API.post("/api/login", {
      email: email.trim().toLowerCase(),
      password,
    });
    setLoading(false);
    if (!res.ok) {
      setError(res.data.error || "Sign-in failed.");
      shake();
      return;
    }
    sessionStorage.setItem("clearams_token", res.data.token);
    onLogin(res.data);
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <img src="GUSD VAPA Logo.png" alt="GUSD VAPA" style={{ height:48, width:"auto" }} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:360 }}>
          <div className="text-center mb-8">
            <img src="GUSD VAPA Logo.png" alt="GUSD VAPA" style={{ height:120, width:"auto", display:"block", margin:"0 auto 20px" }} />
            <h2 className="serif" style={{ fontSize:34, lineHeight:1.05, color:"var(--ink)" }}>
              Sign in to ClearAMS
            </h2>
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              This application uses a unique username and password combination (not standard GUSD or GUSD Google credentials) provided by the GUSD Visual and Performing Arts Department.
            </p>
          </div>

          <form onSubmit={submit}
            style={{ transform: shaking ? "translateX(0)" : undefined,
              animation: shaking ? "shake .4s cubic-bezier(.36,.07,.19,.97)" : undefined }}>
            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>
                </div>
              )}

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Email
                </label>
                <input type="email" value={email} onChange={e => { setEmail(e.target.value); setError(null); }}
                  placeholder="you@gusd.net" autoComplete="email" autoFocus required
                  className="focus-ring" style={inputStyle} />
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Password
                </label>
                <div style={{ position:"relative" }}>
                  <input type={showPw ? "text" : "password"} value={password}
                    onChange={e => { setPassword(e.target.value); setError(null); }}
                    placeholder="••••••••" autoComplete="current-password" required
                    className="focus-ring" style={{ ...inputStyle, paddingRight:40 }} />
                  <button type="button" onClick={() => setShowPw(p => !p)}
                    style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                      background:"none", border:"none", cursor:"pointer", color:"var(--muted)", padding:4 }}>
                    <I name={showPw ? "EyeOff" : "Eye"} size={15} />
                  </button>
                </div>
              </div>

              <button type="submit" disabled={loading} className="btn btn-primary focus-ring"
                style={{ justifyContent:"center", marginTop:4, padding:"11px 0", fontSize:14, width:"100%" }}>
                {loading ? "Signing in…" : "Sign in"}
              </button>
            </div>
          </form>

          <p style={{ fontSize:11, color:"var(--muted)", marginTop:20, textAlign:"center", lineHeight:1.6 }}>
            Contact <a href="mailto:eahangarzadeh@gusd.net" style={{ color:"var(--blue)", textDecoration:"none" }}>Dr. Emil Ahangarzadeh</a> if you need access.
          </p>
        </div>
      </div>

      <div className="hairline-t py-5 text-center" style={{ fontSize:11, color:"var(--muted)", background:"white" }}>
        Glendale Unified School District · <a href="https://www.gusd.net/arts" target="_blank" rel="noopener noreferrer" style={{ color:"inherit", textDecoration:"none" }}>www.gusd.net/arts</a> · {new Date().getFullYear()}
      </div>
    </div>
  );
}

// ── Reset-password screen (forced on first login) ─────────────────────────────
function ResetPasswordScreen({ email, onDone }) {
  const [newPw,    setNewPw]    = useState("");
  const [confirm,  setConfirm]  = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const submit = async (e) => {
    e.preventDefault();
    if (newPw !== confirm) { setError("Passwords do not match."); return; }
    if (newPw.length < 8)  { setError("Password must be at least 8 characters."); return; }
    setLoading(true);
    setError(null);
    const res = await API.post("/api/change-password", { newPassword: newPw, confirmPassword: confirm });
    setLoading(false);
    if (!res.ok) { setError(res.data.error || "Failed to update password."); return; }
    onDone();
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <img src="GUSD VAPA Logo.png" alt="GUSD VAPA" style={{ height:48, width:"auto" }} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:380 }}>
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-full mb-4"
              style={{ background:"var(--blue-soft)", border:"1px solid #BFDBFE" }}>
              <I name="KeyRound" size={22} className="" style={{ color:"var(--blue)" }} />
            </div>
            <h2 className="serif" style={{ fontSize:30, lineHeight:1.1, color:"var(--ink)" }}>
              Set your password
            </h2>
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              You're signed in as <strong style={{ color:"var(--ink)" }}>{email}</strong>.<br/>
              Choose a new password to continue.
            </p>
          </div>

          <form onSubmit={submit}>
            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>
                </div>
              )}

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  New Password
                </label>
                <div style={{ position:"relative" }}>
                  <input type={showPw ? "text" : "password"} value={newPw}
                    onChange={e => { setNewPw(e.target.value); setError(null); }}
                    placeholder="Min 8 characters" autoFocus required minLength={8}
                    className="focus-ring" style={{ ...inputStyle, paddingRight:40 }} />
                  <button type="button" onClick={() => setShowPw(p => !p)}
                    style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                      background:"none", border:"none", cursor:"pointer", color:"var(--muted)", padding:4 }}>
                    <I name={showPw ? "EyeOff" : "Eye"} size={15} />
                  </button>
                </div>
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Confirm Password
                </label>
                <input type={showPw ? "text" : "password"} value={confirm}
                  onChange={e => { setConfirm(e.target.value); setError(null); }}
                  placeholder="Re-enter password" required
                  className="focus-ring" style={inputStyle} />
              </div>

              <button type="submit" disabled={loading} className="btn btn-primary focus-ring"
                style={{ justifyContent:"center", marginTop:4, padding:"11px 0", fontSize:14, width:"100%" }}>
                {loading ? "Saving…" : "Set Password & Continue"}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div className="hairline-t py-5 text-center" style={{ fontSize:11, color:"var(--muted)", background:"white" }}>
        Glendale Unified School District · <a href="https://www.gusd.net/arts" target="_blank" rel="noopener noreferrer" style={{ color:"inherit", textDecoration:"none" }}>www.gusd.net/arts</a> · {new Date().getFullYear()}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("loading");
  const [schoolIds, setSchoolIds] = useState([]);
  const [schoolId,  setSchoolId]  = useState(null);
  const [user,      setUser]      = useState(null);

  const applySession = (data) => {
    const ids = data.schoolIds?.length ? data.schoolIds
               : data.schoolId        ? [data.schoolId]
               : [];
    setSchoolIds(ids);
    setSchoolId(ids[0] ?? null);
    setUser(data);
  };

  // Restore session on load
  useEffect(() => {
    const token = sessionStorage.getItem("clearams_token");
    if (!token) { setView("login"); return; }
    API.get("/api/me").then(res => {
      if (!res.ok) { sessionStorage.removeItem("clearams_token"); setView("login"); return; }
      applySession(res.data);
      setView(res.data.mustResetPassword ? "reset" : "dashboard");
    });
  }, []);

  const onLogin = useCallback((data) => {
    applySession(data);
    setView(data.mustResetPassword ? "reset" : "dashboard");
  }, []);

  const onPasswordReset = useCallback(() => {
    setUser(prev => ({ ...prev, mustResetPassword: false }));
    setView("dashboard");
  }, []);

  const signOut = useCallback(async () => {
    await API.post("/api/logout");
    sessionStorage.removeItem("clearams_token");
    setView("login");
    setSchoolIds([]);
    setSchoolId(null);
    setUser(null);
  }, []);

  if (view === "loading") return (
    <div className="min-h-screen flex items-center justify-center" style={{ background:"white" }}>
      <div style={{ color:"var(--muted)", fontSize:13 }}>Loading…</div>
    </div>
  );

  if (view === "dashboard") return <Dashboard schoolId={schoolId} schoolIds={schoolIds} onSchoolChange={setSchoolId} user={user} onSignOut={signOut} />;
  if (view === "reset")     return <ResetPasswordScreen email={user?.email} onDone={onPasswordReset} />;
  return <LoginScreen onLogin={onLogin} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
