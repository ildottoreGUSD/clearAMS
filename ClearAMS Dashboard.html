const API = {
  async post(path, body) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
      body: JSON.stringify(body),
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
  async get(path) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
};

  return n < 0 ? "−" + abs : abs;
};
const fmtPct = (n, d=1) => `${(n*100).toFixed(d)}%`;

function I({ name, size=16, strokeWidth=1.75, className="", style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const iconData = window.lucide.icons ? (window.lucide.icons[name] || window.lucide.icons.Square) : (window.lucide[name] || window.lucide.Square);
    if (!iconData) return;
    const el = window.lucide.createElement(iconData);
    el.setAttribute("width",  size);
    el.setAttribute("height", size);
    el.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(el);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={style} aria-hidden="true" />;
}

function AnimNum({ value, format=(v=>v), duration=420, className, style }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  const t0Ref   = useRef(0);
  useEffect(() => {
    fromRef.current = disp;
    t0Ref.current   = performance.now();
    let raf;
    const tick = (t) => {
      const k     = Math.min(1, (t - t0Ref.current) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setDisp(fromRef.current + (value - fromRef.current) * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <span className={className} style={style}>{format(disp)}</span>;
}

  useEffect(() => {
    if (!arcRef.current || typeof gsap === "undefined") return;
    const target = circ * (1 - Math.min(pct, 1));
    gsap.fromTo(arcRef.current,
      { strokeDashoffset: circ },
      { strokeDashoffset: target, duration: 1.5, ease: "expo.out", delay: 0.25 }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8EFF7" strokeWidth={11} />
        <circle ref={arcRef} cx={size/2} cy={size/2} r={r}
          fill="none" stroke={color} strokeWidth={11} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={typeof gsap !== "undefined" ? circ : circ * (1 - Math.min(pct, 1))} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
        <div className="mono" style={{ fontSize:13, fontWeight:700, color, lineHeight:1 }}>
          {fmtPct(Math.min(pct, 9.99))}
        </div>
        <div style={{ fontSize:8.5, color:"var(--muted)", marginTop:2, letterSpacing:".05em", textTransform:"uppercase" }}>used</div>
      </div>
    </div>
  );
}

// ── Animated horizontal budget bar ────────────────────────────────────────────
function BudgetBar({ label, share, budget, expended, accent, schoolKey, yearKey, delay=0 }) {
  const fillRef    = useRef(null);
  const pct        = budget > 0 ? expended / budget : 0;
  const overBudget = expended > budget;
  const remaining  = budget - expended;
  const fillColor  = overBudget ? "#DC2626" : accent;

  useEffect(() => {
    if (!fillRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(fillRef.current,
      { scaleX: 0 },
      { scaleX: Math.min(pct, 1), duration: 1.25, ease: "expo.out",
        transformOrigin: "left center", delay }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:7 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <span style={{ width:8, height:8, borderRadius:"50%", background:accent, flexShrink:0, display:"inline-block" }} />
          <span style={{ fontSize:11, fontWeight:700, letterSpacing:".07em", textTransform:"uppercase", color:"var(--ink-2)" }}>
            {label}
          </span>
          <span style={{ fontSize:10, color:"var(--muted)", background:"var(--line-2)", borderRadius:4,
            padding:"1px 6px", fontWeight:600 }}>
            {share}%
          </span>
        </div>
        <span className="mono" style={{ fontSize:12, fontWeight:600, color:"var(--ink)" }}>{fmt$(budget)}</span>
      </div>

      <div style={{ height:10, background:"#EDF0F5", borderRadius:999, overflow:"hidden",
        border:"1px solid var(--line)", position:"relative" }}>
        <div ref={fillRef} style={{
          position:"absolute", top:0, bottom:0, left:0, right:0,
          background:fillColor, borderRadius:999,
          boxShadow:"inset 0 1px 0 rgba(255,255,255,.4)",
          transform: typeof gsap !== "undefined" ? "scaleX(0)" : `scaleX(${Math.min(pct, 1)})`, transformOrigin:"left center",
        }} />
        {overBudget && (
          <div style={{ position:"absolute", inset:0,
            background:"repeating-linear-gradient(90deg,rgba(220,38,38,.18) 0 4px,transparent 4px 8px)" }} />
        )}
      </div>

      <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
        <span style={{ fontSize:11 }}>
          <span className="mono" style={{ fontWeight:600, color: overBudget ? "var(--red)" : "var(--ink)" }}>
            <AnimNum value={expended} format={fmt$} />
          </span>
          <span style={{ color:"var(--muted)", marginLeft:4 }}>expended</span>
        </span>
        <span style={{ fontSize:11 }}>
          <span className="mono" style={{ fontWeight:600,
            color: remaining<0?"var(--red)": remaining<budget*.08?"var(--amber)":"var(--ink-2)" }}>
            {remaining>=0?"":"−"}{fmt$(Math.abs(remaining))}
          </span>
          <span style={{ color:"var(--muted)", marginLeft:4 }}>{remaining>=0?"remaining":"over"}</span>
        </span>
      </div>
    </div>
  );
}

// ── Year column ───────────────────────────────────────────────────────────────
function YearColumn({ yearMeta, school, colWidth, animDelay=0 }) {
  const colRef  = useRef(null);
  const fillRef = useRef(null);
  const { key, label, status } = yearMeta;
  const data       = school[key];
  const isCurrent  = status === "current";
  const { allocation, totalExp } = data;
  const remaining  = allocation - totalExp;
  const usagePct   = allocation > 0 ? totalExp / allocation : 0;
  const overspent  = totalExp > allocation;
  const fillColor  = overspent ? "#DC2626" : usagePct > 0.92 ? "#B45309" : "#15803D";

  const sc = isCurrent
    ? { bg:"var(--blue-soft)",  text:"var(--blue)",  dot:"#1D4ED8", anim:true  }
    : { bg:"var(--green-soft)", text:"var(--green)", dot:"#15803D", anim:false };

  useEffect(() => {
    if (!colRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(colRef.current,
      { opacity:0, y:36 },
      { opacity:1, y:0, duration:1.1, ease:"expo.out", delay:animDelay }
    );
  }, [school.id]);

  useEffect(() => {
    if (!fillRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(fillRef.current,
      { scaleX:0 },
      { scaleX:Math.min(usagePct, 1), duration:1.6, ease:"expo.out",
        transformOrigin:"left center", delay:animDelay + 0.4 }
    );
  }, [school.id, key]);

  return (
    <div ref={colRef} style={{ width:colWidth, flexShrink:0, opacity: typeof gsap !== "undefined" ? 0 : 1 }}>

      {/* Year header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <div style={{ fontSize:17, fontWeight:700, color:"var(--ink)", letterSpacing:"-.02em" }}>{label}</div>
        <div style={{ display:"flex", alignItems:"center", gap:6, borderRadius:999, padding:"5px 12px",
          background:sc.bg, fontSize:10.5, fontWeight:600, color:sc.text, flexShrink:0 }}>
          <span className={sc.anim ? "live-dot" : ""} style={{ width:5, height:5, borderRadius:"50%", background:sc.dot, display:"inline-block" }} />
          {isCurrent ? "Live" : "Final"}
        </div>
      </div>

      {/* Big ring + allocation */}
      <div className="card" style={{ padding:"28px 24px", marginBottom:14, display:"flex", flexDirection:"column", alignItems:"center", gap:18 }}>
        <AllocationRing pct={usagePct} size={120} schoolKey={school.id} yearKey={key} />
        <div style={{ textAlign:"center" }}>
          <div className="eyebrow" style={{ marginBottom:6 }}>Starting Allocation</div>
          <div className="serif" style={{ fontSize:32, lineHeight:1, color:"var(--ink)" }}>
            <AnimNum value={allocation} format={fmt$} />
          </div>
        </div>
      </div>

      {/* Expended / Remaining */}
      <div className="card" style={{ overflow:"hidden", marginBottom:14 }}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
          <div style={{ padding:"18px 20px" }}>
            <div className="eyebrow" style={{ marginBottom:7 }}>Expended</div>
            <div className="mono" style={{ fontSize:18, fontWeight:700, color:"var(--ink)", lineHeight:1 }}>
              <AnimNum value={totalExp} format={fmt$} />
            </div>
          </div>
          <div style={{ padding:"18px 20px", borderLeft:"1px solid var(--line)" }}>
            <div className="eyebrow" style={{ marginBottom:7 }}>{remaining >= 0 ? "Remaining" : "Over"}</div>
            <div className="mono" style={{ fontSize:18, fontWeight:700, lineHeight:1,
              color: overspent ? "var(--red)" : remaining < allocation * 0.05 ? "var(--amber)" : "var(--green)" }}>
              {remaining >= 0 ? "" : "−"}<AnimNum value={Math.abs(remaining)} format={fmt$} />
            </div>
          </div>
        </div>
        <div style={{ padding:"10px 20px 16px", borderTop:"1px solid var(--line)" }}>
          <div style={{ height:7, background:"#EDF0F5", borderRadius:999, overflow:"hidden" }}>
            <div ref={fillRef} style={{
              height:"100%", width:"100%", background:fillColor, borderRadius:999,
              transform: typeof gsap !== "undefined" ? "scaleX(0)" : `scaleX(${Math.min(usagePct,1)})`,
              transformOrigin:"left center",
            }} />
          </div>
          <div style={{ marginTop:6, fontSize:10.5, color:"var(--muted)", display:"flex", justifyContent:"space-between" }}>
            <span>{fmtPct(Math.min(usagePct, 9.99))} utilized</span>
            {overspent && <span style={{ color:"var(--red)", fontWeight:600 }}>Over budget</span>}
          </div>
        </div>
      </div>

    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [shaking,  setShaking]  = useState(false);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const shake = () => {
    setShaking(true);
    setTimeout(() => setShaking(false), 450);
  };

    e.preventDefault();
    setLoading(true);

                </label>
                <input type={showPw ? "text" : "password"} value={confirm}
                  onChange={e => { setConfirm(e.target.value); setError(null); }}
                  placeholder="Re-enter password" required
                  className="focus-ring" style={inputStyle} />
              </div>

              <button type="submit" disabled={loading} className="btn btn-primary focus-ring"
                style={{ justifyContent:"center", marginTop:4, padding:"11px 0", fontSize:14, width:"100%" }}>
                {loading ? "Saving…" : "Set Password & Continue"}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div className="hairline-t py-5 text-center" style={{ fontSize:11, color:"var(--muted)", background:"white" }}>
        Glendale Unified School District · <a href="https://www.gusd.net/arts" target="_blank" rel="noopener noreferrer" style={{ color:"inherit", textDecoration:"none" }}>www.gusd.net/arts</a> · {new Date().getFullYear()}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("loading");
  const [schoolIds, setSchoolIds] = useState([]);
  const [schoolId,  setSchoolId]  = useState(null);
  const [user,      setUser]      = useState(null);

  const applySession = (data) => {
    const ids = data.schoolIds?.length ? data.schoolIds
               : data.schoolId        ? [data.schoolId]
               : [];
    setSchoolIds(ids);
    setSchoolId(ids[0] ?? null);
    setUser(data);
  };

  // Restore session on load
  useEffect(() => {
    const token = sessionStorage.getItem("clearams_token");
    if (!token) { setView("login"); return; }
    API.get("/api/me").then(res => {
      if (!res.ok) { sessionStorage.removeItem("clearams_token"); setView("login"); return; }
      applySession(res.data);
      setView(res.data.mustResetPassword ? "reset" : "dashboard");
    });
  }, []);

  const onLogin = useCallback((data) => {
    applySession(data);
    setView(data.mustResetPassword ? "reset" : "dashboard");
  }, []);

  const onPasswordReset = useCallback(() => {
    setUser(prev => ({ ...prev, mustResetPassword: false }));
    setView("dashboard");
  }, []);

  const signOut = useCallback(async () => {
    await API.post("/api/logout");
    sessionStorage.removeItem("clearams_token");
    setView("login");
    setSchoolIds([]);
    setSchoolId(null);
    setUser(null);
  }, []);

  if (view === "loading") return (
    <div className="min-h-screen flex items-center justify-center" style={{ background:"white" }}>
      <div style={{ color:"var(--muted)", fontSize:13 }}>Loading…</div>
    </div>
  );

  if (view === "dashboard") return <Dashboard schoolId={schoolId} schoolIds={schoolIds} onSchoolChange={setSchoolId} user={user} onSignOut={signOut} />;
  if (view === "reset")     return <ResetPasswordScreen email={user?.email} onDone={onPasswordReset} />;
  return <LoginScreen onLogin={onLogin} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
