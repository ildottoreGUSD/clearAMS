const API = {
  async post(path, body) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
      body: JSON.stringify(body),
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
  async get(path) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
};

  const abs = Math.abs(Math.round(n)).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
  return n < 0 ? "−" + abs : abs;
};
const fmtPct = (n, d=1) => `${(n*100).toFixed(d)}%`;

function I({ name, size=16, strokeWidth=1.75, className="", style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const iconData = window.lucide.icons ? (window.lucide.icons[name] || window.lucide.icons.Square) : (window.lucide[name] || window.lucide.Square);
    if (!iconData) return;
    const el = window.lucide.createElement(iconData);
    el.setAttribute("width",  size);
    el.setAttribute("height", size);
    el.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(el);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={style} aria-hidden="true" />;
}

function AnimNum({ value, format=(v=>v), duration=420, className, style }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  const t0Ref   = useRef(0);
  useEffect(() => {
    fromRef.current = disp;
    t0Ref.current   = performance.now();
    let raf;
    const tick = (t) => {
      const k     = Math.min(1, (t - t0Ref.current) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setDisp(fromRef.current + (value - fromRef.current) * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <span className={className} style={style}>{format(disp)}</span>;
}

// ── Allocation ring ────────────────────────────────────────────────────────────
function AllocationRing({ pct, size=96, schoolKey, yearKey }) {
  const arcRef    = useRef(null);
  const r         = (size - 14) / 2;
  const circ      = 2 * Math.PI * r;
  const overspent = pct > 1;
  const color     = overspent ? "#DC2626" : pct > 0.92 ? "#B45309" : "#15803D";

  useEffect(() => {
    if (!arcRef.current || typeof gsap === "undefined") return;
    const target = circ * (1 - Math.min(pct, 1));
    gsap.fromTo(arcRef.current,
      { strokeDashoffset: circ },
      { strokeDashoffset: target, duration: 1.5, ease: "expo.out", delay: 0.25 }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8EFF7" strokeWidth={11} />
        <circle ref={arcRef} cx={size/2} cy={size/2} r={r}
          fill="none" stroke={color} strokeWidth={11} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={typeof gsap !== "undefined" ? circ : circ * (1 - Math.min(pct, 1))} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
        <div className="mono" style={{ fontSize:13, fontWeight:700, color, lineHeight:1 }}>
          {fmtPct(Math.min(pct, 9.99))}
        </div>
        <div style={{ fontSize:8.5, color:"var(--muted)", marginTop:2, letterSpacing:".05em", textTransform:"uppercase" }}>used</div>
      </div>
    </div>
  );
}

function fiscalYearPace(key) {
  const ranges = {
    fy2526: { start: new Date("2025-07-01"), end: new Date("2026-07-01") },
    fy2425: { start: new Date("2024-07-01"), end: new Date("2025-07-01") },
  };
  const r = ranges[key];
  if (!r) return null;
  const total   = r.end - r.start;
  const elapsed = Math.min(Math.max(Date.now() - r.start, 0), total);
  return elapsed / total;
}

                fontSize:10, fontWeight:700, letterSpacing:".04em",
                color:"#92400E", background:"#FEF3C7",
                border:"1px solid #FDE68A", borderRadius:99,
                padding:"3px 8px", cursor:"pointer"
              }}>⚠ Prior Year Overage</button>
            )}
            {fy2526draw !== null && (
              <div style={{ marginTop:8, fontSize:10, color:"#92400E",
                fontWeight:600, lineHeight:1.4 }}>
                ↓ {fmt$(fy2526draw)} drawn from this pool by FY25-26 overspend
              </div>
            )}
            {isDeficit && (
              <div style={{ marginTop:8, fontSize:10, fontWeight:700, letterSpacing:".04em",
                color:"#7F1D1D", background:"#FEE2E2",
                border:"1px solid #FECACA", borderRadius:99,
                padding:"3px 8px", display:"inline-block" }}>
                ⚠ Deficit — applied to FY26-27
              </div>
            )}
          </div>
        </div>
        {showWaiver && <WaiverModal yearKey={key} onClose={() => setShowWaiver(false)} />}
        {showOverageWarn && priorYearOverage !== null && (
          <div onClick={() => setShowOverageWarn(false)} style={{
            position:"fixed", inset:0, zIndex:1000,
            background:"rgba(11,27,51,.5)", backdropFilter:"blur(3px)",
            display:"flex", alignItems:"center", justifyContent:"center", padding:24
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"#fff", borderRadius:18, padding:"28px 32px",
              maxWidth:460, width:"100%", boxShadow:"0 24px 64px rgba(11,27,51,.22)"
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18 }}>
                <div>
                  <div style={{ fontSize:10, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#92400E", marginBottom:4 }}>Notice</div>
                  <div style={{ fontSize:17, fontWeight:700, color:"var(--ink)", lineHeight:1.2 }}>Prior Year Overage</div>
                </div>
                <button onClick={() => setShowOverageWarn(false)} style={{ border:"none", background:"#F1F5F9", borderRadius:99, width:30, height:30, fontSize:16, cursor:"pointer", color:"var(--muted)", flexShrink:0, marginLeft:16 }}>×</button>
              </div>
              <div style={{ background:"#FEF3C7", border:"1px solid #FDE68A", borderRadius:10, padding:"14px 16px", marginBottom:16 }}>
                <div style={{ fontSize:22, fontWeight:700, color:"#92400E", fontFamily:"ui-monospace, SFMono-Regular, Menlo, monospace" }}>−{fmt$(priorYearOverage)}</div>
                <div style={{ fontSize:11, color:"#92400E", marginTop:3 }}>FY 2024–25 overage (column U)</div>
              </div>
              <p style={{ fontSize:13, color:"var(--ink-2)", lineHeight:1.7, margin:0 }}>
                The FY 2024–25 available balance for this school is in the red by <strong>{fmt$(priorYearOverage)}</strong>. This overage will need to be debited from the FY 2025–26 allocation before funds are committed.
              </p>
              <p style={{ fontSize:12, color:"var(--muted)", lineHeight:1.6, marginTop:10 }}>
                No debit has been applied to these figures. The amounts shown above reflect the allocation and expenditure data as imported.
              </p>
            </div>
          </div>
        )}
        <div style={{ padding:"10px 20px 16px", borderTop:"1px solid var(--line)" }}>
          <div style={{ height:7, background:"#EDF0F5", borderRadius:999, overflow:"hidden" }}>
            <div ref={fillRef} style={{
              height:"100%", width:"100%", background:fillColor, borderRadius:999,
              transform: typeof gsap !== "undefined" ? "scaleX(0)" : `scaleX(${Math.min(usagePct,1)})`,
              transformOrigin:"left center",
            }} />
          </div>
          <div style={{ marginTop:6, fontSize:10.5, color:"var(--muted)", display:"flex", justifyContent:"space-between" }}>
            <span>{fmtPct(Math.min(usagePct, 9.99))} utilized</span>
            {overspent && <span style={{ color:"var(--red)", fontWeight:600 }}>Over budget</span>}
          </div>
          {paceVerdict && (
            <div style={{ marginTop:8, display:"inline-flex", alignItems:"center", gap:5,
              fontSize:10, fontWeight:700, color:paceVerdict.color,
              background:paceVerdict.bg, borderRadius:99, padding:"3px 10px" }}>
              {paceVerdict.label}
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

// ── Plan Editor ───────────────────────────────────────────────────────────────
const PLAN_YEARS = {
  fy2627: "FY 2026–27",
  fy2526: "FY 2025–26",
};

function planTotal(items) {
  return items.reduce((s, it) => s + (parseFloat(it.amount) || 0), 0);
}

function PlanLineItems({ items, onChange, maxLabel, maxAmt, color }) {
  const addItem = () => onChange([...items, { id: crypto.randomUUID(), description: "", amount: "" }]);
  const removeItem = (id) => onChange(items.filter(it => it.id !== id));
  const updateItem = (id, field, val) =>
    onChange(items.map(it => it.id === id ? { ...it, [field]: val } : it));

  const total = planTotal(items);
  const overMax = maxAmt > 0 && total > maxAmt;

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ fontSize:11, color:"var(--muted)" }}>
          Max allowed: <strong style={{ color: overMax ? "var(--red)" : "var(--ink)" }}>{fmt$(maxAmt)}</strong>
          {overMax && <span style={{ color:"var(--red)", marginLeft:6 }}>⚠ Over limit</span>}
        </div>
        <button onClick={addItem} style={{
          display:"inline-flex", alignItems:"center", gap:5,
          fontSize:12, fontWeight:600, color:"var(--blue)",
          background:"var(--blue-soft)", border:"1px solid #BFDBFE",
          borderRadius:6, padding:"5px 10px", cursor:"pointer"
        }}>+ Add line item</button>
      </div>

      {items.length === 0 ? (
        <div style={{ textAlign:"center", padding:"20px 0", fontSize:13, color:"var(--muted)",
          border:"1px dashed var(--line)", borderRadius:8 }}>
          No items yet — click "+ Add line item"
        </div>
      ) : (
        <div style={{ border:"1px solid var(--line)", borderRadius:8, overflow:"hidden" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 140px 36px",
            background:"var(--surface)", borderBottom:"1px solid var(--line)",
            padding:"7px 12px", fontSize:10.5, fontWeight:600, color:"var(--muted)",
            textTransform:"uppercase", letterSpacing:".07em" }}>
            <span>Description</span><span>Amount</span><span />
          </div>
          {items.map((it, i) => (
            <div key={it.id} style={{
              display:"grid", gridTemplateColumns:"1fr 140px 36px", alignItems:"center",
              padding:"7px 8px 7px 12px", gap:8,
              borderBottom: i < items.length - 1 ? "1px solid var(--line-2)" : "none",
              background:"white"
            }}>
              <input value={it.description} placeholder="Describe the expenditure…"
                onChange={e => updateItem(it.id, "description", e.target.value)}
                style={{ fontSize:13, padding:"6px 9px", border:"1px solid var(--line)",
                  borderRadius:6, fontFamily:"inherit", color:"var(--ink)", outline:"none", width:"100%" }} />
              <div style={{ position:"relative" }}>
                <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)",
                  fontSize:13, color:"var(--muted)", pointerEvents:"none" }}>$</span>
                <input type="number" min="0" step="0.01" value={it.amount} placeholder="0"
                  onChange={e => updateItem(it.id, "amount", e.target.value)}
                  style={{ fontSize:13, padding:"6px 9px 6px 20px", border:"1px solid var(--line)",
                    borderRadius:6, fontFamily:"Geist Mono, monospace", color:"var(--ink)",
                    outline:"none", width:"100%" }} />
              </div>
              <button onClick={() => removeItem(it.id)} style={{
                width:28, height:28, borderRadius:6, border:"1px solid var(--line)",
                background:"white", cursor:"pointer", color:"var(--muted)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:14
              }}>×</button>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop:8, textAlign:"right", fontSize:12, fontWeight:700,
        color: overMax ? "var(--red)" : "var(--ink)" }}>
        Total: {fmt$(total)}
        {overMax && <span style={{ fontSize:11, fontWeight:400, color:"var(--red)", marginLeft:6 }}>
          ({fmt$(total - maxAmt)} over limit)
        </span>}
      </div>
    </div>
  );
}

function PlanEditor({ schoolId, fiscalYear, onBack, user }) {
  const school    = SCHOOLS[schoolId];
  const yearLabel = PLAN_YEARS[fiscalYear] || fiscalYear;
  const isUpcoming = fiscalYear === "fy2627";

  // Allocation: for upcoming year, default to prior year allocation as estimate
  const officialAlloc = school[fiscalYear]?.allocation ?? null;
  const fallbackAlloc = isUpcoming ? (school.fy2526?.allocation ?? 0) : (officialAlloc ?? 0);

  const [allocEstimate,      setAllocEstimate]      = useState(null);
  const [programDescription, setProgramDescription] = useState("");
  const [staffing,           setStaffing]           = useState([]);
  const [supplies,           setSupplies]           = useState([]);
  const [status,             setStatus]             = useState("draft");
  const [submittedAt,        setSubmittedAt]        = useState(null);
  const [submittedBy,        setSubmittedBy]        = useState(null);
  const [savedAt,            setSavedAt]            = useState(null);
  const [loading,            setLoading]            = useState(true);
  const [saving,             setSaving]             = useState(false);
  const [msg,                setMsg]                = useState(null);
  const [confirmSubmit,      setConfirmSubmit]      = useState(false);

  const alloc      = allocEstimate !== null ? allocEstimate : fallbackAlloc;
  const maxStaff   = alloc * 0.80;
  const maxSupply  = alloc * 0.20;
  const staffTotal = planTotal(staffing);
  const suppTotal  = planTotal(supplies);
  const grandTotal = staffTotal + suppTotal;
  const pct        = alloc > 0 ? Math.min(grandTotal / alloc, 1) : 0;
  const overBudget = grandTotal > alloc;
  const overStaff  = staffTotal > maxStaff;
  const overSupply = suppTotal  > maxSupply;
  const isLocked   = status === "submitted";

  // Load existing plan
  useEffect(() => {
    const token = sessionStorage.getItem("clearams_token");
    fetch(`/api/plan/${schoolId}/${fiscalYear}`, {
      headers: token ? { Authorization: `Bearer ${token}` } : {}
    })
      .then(r => r.json())
      .then(d => {
        if (d.staffing)           setStaffing(d.staffing);
        if (d.supplies)           setSupplies(d.supplies);
        if (d.programDescription !== undefined) setProgramDescription(d.programDescription);
        if (d.allocEstimate != null) setAllocEstimate(d.allocEstimate);
        if (d.status)             setStatus(d.status);
        if (d.submittedAt)        setSubmittedAt(d.submittedAt);
        if (d.submittedBy)        setSubmittedBy(d.submittedBy);
        if (d.savedAt)            setSavedAt(d.savedAt);
      })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, [schoolId, fiscalYear]);

  const buildPayload = () => ({
    allocEstimate:      alloc,
    programDescription,
    staffing,
    supplies,
  });

  const saveDraft = async () => {
    setSaving(true);
    setMsg(null);
    try {
      const token = sessionStorage.getItem("clearams_token");
      const res = await fetch(`/api/plan/${schoolId}/${fiscalYear}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        body: JSON.stringify(buildPayload()),
      });
      const d = await res.json();
      if (d.ok) { setSavedAt(new Date().toISOString()); setMsg({ type:"ok", text:"Draft saved." }); }
      else setMsg({ type:"err", text: d.error || "Save failed." });
    } catch { setMsg({ type:"err", text:"Network error." }); }
    setSaving(false);
    setTimeout(() => setMsg(null), 3000);
  };

  const submitPlan = async () => {
    setConfirmSubmit(false);
    setSaving(true);
    setMsg(null);
    try {
      const token = sessionStorage.getItem("clearams_token");
      const res = await fetch(`/api/plan/${schoolId}/${fiscalYear}/submit`, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) },
        body: JSON.stringify(buildPayload()),
      });
      const d = await res.json();
      if (d.ok) {
        setStatus("submitted");
        setSubmittedAt(new Date().toISOString());
        setSubmittedBy(user?.email);
        setMsg({ type:"ok", text:"Plan submitted to GUSD VAPA." });
      } else setMsg({ type:"err", text: d.error || "Submit failed." });
    } catch { setMsg({ type:"err", text:"Network error." }); }
    setSaving(false);
  };

  const printPlan = () => window.print();

  if (loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:"var(--muted)", fontSize:13 }}>Loading plan…</div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"var(--surface)" }} id="plan-editor">

      {/* Print styles */}
      <style>{`
        @media print {
          #plan-editor-toolbar, #plan-editor-actions { display: none !important; }
          #plan-editor { background: white !important; }
          body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
      `}</style>

      {/* Toolbar */}
      <div id="plan-editor-toolbar" className="hairline-b" style={{ background:"white", position:"sticky", top:0, zIndex:10 }}>
        <div className="mx-auto px-10 py-3 flex items-center justify-between" style={{ maxWidth:900 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <button onClick={onBack} style={{ background:"none", border:"1px solid var(--line)",
              borderRadius:7, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer",
              display:"flex", alignItems:"center", gap:6, color:"var(--ink)" }}>
              ← Back
            </button>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:"var(--ink)", letterSpacing:"-.01em" }}>
                {yearLabel} Site Expenditure Plan
              </div>
              <div style={{ fontSize:11, color:"var(--muted)", marginTop:1 }}>{school.name}</div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            {isLocked && (
              <span style={{ fontSize:11, fontWeight:700, color:"var(--green)",
                background:"var(--green-soft)", border:"1px solid #A7F3D0",
                borderRadius:999, padding:"4px 12px" }}>✓ Submitted</span>
            )}
            {savedAt && !isLocked && (
              <span style={{ fontSize:11, color:"var(--muted)" }}>
                Saved {new Date(savedAt).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}
              </span>
            )}
            <button onClick={printPlan} style={{ background:"none", border:"1px solid var(--line)",
              borderRadius:7, padding:"6px 12px", fontSize:13, fontWeight:500, cursor:"pointer",
              display:"flex", alignItems:"center", gap:6, color:"var(--ink)" }}>
              🖨 Print
            </button>
          </div>
        </div>
      </div>

      <div className="mx-auto px-10 py-8" style={{ maxWidth:900 }}>

        {/* Submitted banner */}
        {isLocked && (
          <div style={{ background:"var(--green-soft)", border:"1px solid #A7F3D0", borderRadius:10,
            padding:"14px 20px", marginBottom:24, display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ fontSize:18 }}>✓</span>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:"var(--green)" }}>Plan submitted</div>
              <div style={{ fontSize:12, color:"var(--green)", opacity:.8, marginTop:2 }}>
                Submitted by {submittedBy} on {new Date(submittedAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}. Contact GUSD VAPA to request changes.
              </div>
            </div>
          </div>
        )}

        {/* Allocation bar */}
        <div className="card" style={{ padding:"20px 24px", marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:14, gap:16 }}>
            <div style={{ flex:1 }}>
              <div className="eyebrow" style={{ marginBottom:6 }}>
                {isUpcoming ? "Estimated Allocation (FY 2025–26 basis)" : "Allocation"}
              </div>
              {isUpcoming ? (
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:10, color:"#92400E", background:"#FEF3C7",
                    border:"1px solid #FDE68A", borderRadius:999, padding:"2px 9px",
                    fontWeight:600, whiteSpace:"nowrap" }}>
                    ⚠ Official amount TBD — CDE publishes July 2026
                  </span>
                </div>
              ) : (
                <div className="serif" style={{ fontSize:28, lineHeight:1, color:"var(--ink)" }}>
                  {fmt$(alloc)}
                </div>
              )}
              {isUpcoming && (
                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
                  <span style={{ fontSize:12, color:"var(--muted)" }}>Planning with:</span>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)",
                      fontSize:13, color:"var(--muted)", pointerEvents:"none" }}>$</span>
                    <input type="number" disabled={isLocked} value={alloc} min="0" step="1"
                      onChange={e => setAllocEstimate(parseFloat(e.target.value) || 0)}
                      style={{ fontSize:14, fontWeight:700, padding:"6px 9px 6px 20px",
                        border:"1px solid var(--line)", borderRadius:7,
                        fontFamily:"Geist Mono, monospace", color:"var(--ink)", outline:"none",
                        width:160, background: isLocked ? "#f8fafc" : "white" }} />
                  </div>
                </div>
              )}
            </div>
            <div style={{ textAlign:"right", flexShrink:0 }}>
              <div className="eyebrow" style={{ marginBottom:4 }}>Planned</div>
              <div className="mono" style={{ fontSize:22, fontWeight:700,
                color: overBudget ? "var(--red)" : "var(--ink)" }}>
                {fmt$(grandTotal)}
              </div>
              <div style={{ fontSize:11, color:"var(--muted)", marginTop:2 }}>
                of {fmt$(alloc)} ({alloc > 0 ? fmtPct(grandTotal/alloc) : "0%"})
              </div>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ height:8, background:"#EDF0F5", borderRadius:999, overflow:"hidden", marginBottom:10 }}>
            <div style={{ height:"100%", borderRadius:999, transition:"width .3s",
              width:`${Math.min(pct*100,100)}%`,
              background: overBudget ? "#DC2626" : pct > 0.95 ? "#B45309" : "#1D4ED8" }} />
          </div>

          {/* 80/20 breakdown */}
          <div style={{ display:"flex", gap:24, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ width:10, height:10, borderRadius:2, background:"#1D4ED8", display:"inline-block" }} />
              <span style={{ fontSize:12, color:"var(--ink)" }}>
                Staffing: <strong className="mono">{fmt$(staffTotal)}</strong>
                <span style={{ color: overStaff ? "var(--red)" : "var(--muted)", marginLeft:4 }}>
                  / {fmt$(maxStaff)} max (80%)
                </span>
                {overStaff && <span style={{ color:"var(--red)", marginLeft:4, fontWeight:700 }}>⚠ Over</span>}
              </span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ width:10, height:10, borderRadius:2, background:"#0D9488", display:"inline-block" }} />
              <span style={{ fontSize:12, color:"var(--ink)" }}>
                Supplies: <strong className="mono">{fmt$(suppTotal)}</strong>
                <span style={{ color: overSupply ? "var(--red)" : "var(--muted)", marginLeft:4 }}>
                  / {fmt$(maxSupply)} max (20%)
                </span>
                {overSupply && <span style={{ color:"var(--red)", marginLeft:4, fontWeight:700 }}>⚠ Over</span>}
              </span>
            </div>
          </div>
        </div>

        {/* Program description */}
        <div className="card" style={{ padding:"20px 24px", marginBottom:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"var(--ink)", marginBottom:4 }}>Program Description</div>
          <div style={{ fontSize:12, color:"var(--muted)", marginBottom:12 }}>
            Briefly describe the arts and music programming this funding will support.
          </div>
          <textarea disabled={isLocked} value={programDescription}
            onChange={e => setProgramDescription(e.target.value)}
            rows={4} placeholder="Describe the school's arts and music program, goals, and how Prop 28 funds will be used…"
            style={{ width:"100%", padding:"10px 12px", fontSize:13, fontFamily:"inherit",
              border:"1px solid var(--line)", borderRadius:8, resize:"vertical",
              color:"var(--ink)", outline:"none", lineHeight:1.6, boxSizing:"border-box",
              background: isLocked ? "#f8fafc" : "white" }} />
        </div>

        {/* Staffing */}
        <div className="card" style={{ padding:"20px 24px", marginBottom:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"var(--ink)", marginBottom:2 }}>
            Staffing & Personnel
          </div>
          <div style={{ fontSize:12, color:"var(--muted)", marginBottom:16 }}>
            Include teachers, coaches, resident artists, and any personnel funded by Prop 28.
            Must not exceed 80% of allocation ({fmt$(maxStaff)}).
          </div>
          {isLocked
            ? <PlanLineItems items={staffing} onChange={() => {}} maxAmt={maxStaff} />
            : <PlanLineItems items={staffing} onChange={setStaffing} maxAmt={maxStaff} />
          }
        </div>

        {/* Supplies */}
        <div className="card" style={{ padding:"20px 24px", marginBottom:28 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"var(--ink)", marginBottom:2 }}>
            Supplies & Materials
          </div>
          <div style={{ fontSize:12, color:"var(--muted)", marginBottom:16 }}>
            Include instruments, equipment, materials, and other non-personnel costs.
            Must not exceed 20% of allocation ({fmt$(maxSupply)}).
          </div>
          {isLocked
            ? <PlanLineItems items={supplies} onChange={() => {}} maxAmt={maxSupply} />
            : <PlanLineItems items={supplies} onChange={setSupplies} maxAmt={maxSupply} />
          }
        </div>

        {/* Actions */}
        {!isLocked && (
          <div id="plan-editor-actions" style={{ display:"flex", alignItems:"center",
            justifyContent:"space-between", gap:12 }}>
            <div>
              {msg && (
                <span style={{ fontSize:13, fontWeight:500,
                  color: msg.type === "ok" ? "var(--green)" : "var(--red)" }}>
                  {msg.text}
                </span>
              )}
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={saveDraft} disabled={saving} style={{
                padding:"9px 20px", fontSize:13, fontWeight:600, cursor:"pointer",
                border:"1px solid var(--line)", borderRadius:8, background:"white",
                color:"var(--ink)", opacity: saving ? .5 : 1
              }}>
                {saving ? "Saving…" : "Save Draft"}
              </button>
              <button onClick={() => setConfirmSubmit(true)} disabled={saving || overBudget || overStaff || overSupply || grandTotal === 0}
                style={{ padding:"9px 20px", fontSize:13, fontWeight:600, cursor:"pointer",
                  border:"none", borderRadius:8, background:"var(--navy)", color:"white",
                  opacity: (saving || overBudget || overStaff || overSupply || grandTotal === 0) ? .45 : 1
                }}>
                Submit Plan →
              </button>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop:32, paddingTop:16, borderTop:"1px solid var(--line)",
          fontSize:11, color:"var(--muted)", lineHeight:1.6 }}>
          Glendale Unified School District · Prop 28 (Arts & Music in Schools) ·
          Questions: <a href="mailto:eahangarzadeh@gusd.net" style={{ color:"var(--blue)" }}>Dr. Emil Ahangarzadeh</a>
        </div>
      </div>

      {/* Confirm submit modal */}
      {confirmSubmit && (
        <div onClick={() => setConfirmSubmit(false)} style={{
          position:"fixed", inset:0, zIndex:1000, background:"rgba(11,27,51,.5)",
          backdropFilter:"blur(3px)", display:"flex", alignItems:"center", justifyContent:"center", padding:24
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"white", borderRadius:16, padding:"28px 32px",
            maxWidth:420, width:"100%", boxShadow:"0 24px 64px rgba(11,27,51,.22)"
          }}>
            <div style={{ fontSize:17, fontWeight:700, color:"var(--ink)", marginBottom:8 }}>Submit plan?</div>
            <p style={{ fontSize:13, color:"var(--muted)", lineHeight:1.65, marginBottom:20 }}>
              Once submitted, your {yearLabel} Site Expenditure Plan will be locked and sent to GUSD VAPA for review.
              You won't be able to make further edits without contacting Dr. Ahangarzadeh.
            </p>
            <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
              <button onClick={() => setConfirmSubmit(false)} style={{
                padding:"9px 18px", fontSize:13, fontWeight:500, cursor:"pointer",

              }}>Yes, submit</button>

  );
}

// ── Sign-In screen ───────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [shaking,  setShaking]  = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const shake = () => {
    setShaking(true);
    setTimeout(() => setShaking(false), 450);
  };

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    const res = await API.post("/api/login", {
      email: email.trim().toLowerCase(),
      password,
    });
    setLoading(false);
    if (!res.ok) {
      setError(res.data.error || "Sign-in failed.");
      shake();
      return;
    }
    sessionStorage.setItem("clearams_token", res.data.token);
    onLogin(res.data);
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <ClearAMSLogo height={32} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      {/* GUSD VAPA logo + app name */}
      <div className="text-center" style={{ padding:"20px 16px 0" }}>
        <img src="/GUSD%20VAPA%20Logo.png" alt="GUSD Visual and Performing Arts"
          style={{ width:120, height:120, objectFit:"contain", display:"block", margin:"0 auto" }}/>
        <h2 className="serif" style={{ fontSize:38, lineHeight:1.05, color:"var(--ink)", marginTop:14, letterSpacing:"-.02em" }}>
          ClearAMS
        </h2>
      </div>

      {/* VAPA hero image */}
      <div style={{ display:"flex", justifyContent:"center", padding:"16px 16px 0" }}>
        <img src="/vapa-icon-clean.png" alt="" style={{ width:400, maxWidth:"100%", display:"block" }}/>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:360 }}>
          <div className="text-center mb-8">
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              This application uses a unique username and password combination (not standard GUSD or GUSD Google credentials) provided by the GUSD Visual and Performing Arts Department.
            </p>
          </div>

          <form onSubmit={submit}

            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>
                </div>
              )}

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Email
                </label>
                <input type="email" value={email} onChange={e => { setEmail(e.target.value); setError(null); }}

                  className="focus-ring" style={inputStyle} />
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>

                <div style={{ position:"relative" }}>

// ── Reset-password screen (forced on first login) ─────────────────────────────
function ResetPasswordScreen({ email, onDone }) {
  const [newPw,    setNewPw]    = useState("");
  const [confirm,  setConfirm]  = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const submit = async (e) => {
    e.preventDefault();
    if (newPw !== confirm) { setError("Passwords do not match."); return; }
    if (newPw.length < 8)  { setError("Password must be at least 8 characters."); return; }
    setLoading(true);
    setError(null);
    const res = await API.post("/api/change-password", { newPassword: newPw, confirmPassword: confirm });
    setLoading(false);
    if (!res.ok) { setError(res.data.error || "Failed to update password."); return; }
    onDone();
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <ClearAMSLogo height={32} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:380 }}>
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-full mb-4"
              style={{ background:"var(--blue-soft)", border:"1px solid #BFDBFE" }}>
              <I name="KeyRound" size={22} className="" style={{ color:"var(--blue)" }} />
            </div>
            <h2 className="serif" style={{ fontSize:30, lineHeight:1.1, color:"var(--ink)" }}>
              Set your password
            </h2>
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              You're signed in as <strong style={{ color:"var(--ink)" }}>{email}</strong>.<br/>
              Choose a new password to continue.
            </p>
          </div>

          <form onSubmit={submit}>
            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>
                </div>
              )}

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  New Password
                </label>
                <div style={{ position:"relative" }}>
                  <input type={showPw ? "text" : "password"} value={newPw}
                    onChange={e => { setNewPw(e.target.value); setError(null); }}
                    placeholder="Min 8 characters" autoFocus required minLength={8}
                    className="focus-ring" style={{ ...inputStyle, paddingRight:40 }} />
                  <button type="button" onClick={() => setShowPw(p => !p)}
                    style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                      background:"none", border:"none", cursor:"pointer", color:"var(--muted)", padding:4 }}>
                    <I name={showPw ? "EyeOff" : "Eye"} size={15} />
                  </button>
                </div>
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Confirm Password
                </label>
                <input type={showPw ? "text" : "password"} value={confirm}
                  onChange={e => { setConfirm(e.target.value); setError(null); }}
                  placeholder="Re-enter password" required
                  className="focus-ring" style={inputStyle} />
              </div>

              <button type="submit" disabled={loading} className="btn btn-primary focus-ring"
                style={{ justifyContent:"center", marginTop:4, padding:"11px 0", fontSize:14, width:"100%" }}>
                {loading ? "Saving…" : "Set Password & Continue"}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div className="hairline-t py-5 text-center" style={{ fontSize:11, color:"var(--muted)", background:"white" }}>
        Glendale Unified School District · <a href="https://www.gusd.net/arts" target="_blank" rel="noopener noreferrer" style={{ color:"inherit", textDecoration:"none" }}>www.gusd.net/arts</a> · {new Date().getFullYear()}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [view,        setView]        = useState("loading");
  const [schoolIds,   setSchoolIds]   = useState([]);
  const [schoolId,    setSchoolId]    = useState(null);
  const [user,        setUser]        = useState(null);
  const [planYear,    setPlanYear]    = useState(null);

  const applySession = (data) => {
    const ids = data.schoolIds?.length ? data.schoolIds
               : data.schoolId        ? [data.schoolId]
               : [];
    setSchoolIds(ids);
    setSchoolId(ids[0] ?? null);
    setUser(data);
  };

  // Restore session on load
  useEffect(() => {
    const token = sessionStorage.getItem("clearams_token");
    if (!token) { setView("login"); return; }
    API.get("/api/me").then(res => {
      if (!res.ok) { sessionStorage.removeItem("clearams_token"); setView("login"); return; }
      applySession(res.data);
      setView(res.data.mustResetPassword ? "reset" : "dashboard");
    });
  }, []);

  const onLogin = useCallback((data) => {
    applySession(data);
    setView(data.mustResetPassword ? "reset" : "dashboard");
  }, []);

  const onPasswordReset = useCallback(() => {
    setUser(prev => ({ ...prev, mustResetPassword: false }));
    setView("dashboard");
  }, []);

  const signOut = useCallback(async () => {
    await API.post("/api/logout");
    sessionStorage.removeItem("clearams_token");
    setView("login");
    setSchoolIds([]);
    setSchoolId(null);
    setUser(null);
  }, []);

  if (view === "loading") return (
    <div className="min-h-screen flex items-center justify-center" style={{ background:"white" }}>
      <div style={{ color:"var(--muted)", fontSize:13 }}>Loading…</div>
    </div>
  );

  if (view === "plan") return (
    <PlanEditor
      schoolId={schoolId}
      fiscalYear={planYear}
      user={user}
      onBack={() => setView("dashboard")}
    />
  );
  if (view === "dashboard") return (
    <Dashboard
      schoolId={schoolId} schoolIds={schoolIds}
      onSchoolChange={setSchoolId} user={user} onSignOut={signOut}
      onOpenPlan={(yr) => { setPlanYear(yr); setView("plan"); }}
    />
  );
  if (view === "reset") return <ResetPasswordScreen email={user?.email} onDone={onPasswordReset} />;
  return <LoginScreen onLogin={onLogin} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
