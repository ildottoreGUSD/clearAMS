const API = {
  async post(path, body) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) },
      body: JSON.stringify(body),
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
  async get(path) {
    const token = sessionStorage.getItem("clearams_token");
    const res = await fetch(path, {
      headers: token ? { "Authorization": `Bearer ${token}` } : {},
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  },
};

  const abs = Math.abs(Math.round(n)).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
  return n < 0 ? "−" + abs : abs;
};
const fmtPct = (n, d=1) => `${(n*100).toFixed(d)}%`;

function I({ name, size=16, strokeWidth=1.75, className="", style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const iconData = window.lucide.icons ? (window.lucide.icons[name] || window.lucide.icons.Square) : (window.lucide[name] || window.lucide.Square);
    if (!iconData) return;
    const el = window.lucide.createElement(iconData);
    el.setAttribute("width",  size);
    el.setAttribute("height", size);
    el.setAttribute("stroke-width", strokeWidth);
    ref.current.appendChild(el);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={style} aria-hidden="true" />;
}

function AnimNum({ value, format=(v=>v), duration=420, className, style }) {
  const [disp, setDisp] = useState(value);
  const fromRef = useRef(value);
  const t0Ref   = useRef(0);
  useEffect(() => {
    fromRef.current = disp;
    t0Ref.current   = performance.now();
    let raf;
    const tick = (t) => {
      const k     = Math.min(1, (t - t0Ref.current) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setDisp(fromRef.current + (value - fromRef.current) * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <span className={className} style={style}>{format(disp)}</span>;
}

// ── Allocation ring ────────────────────────────────────────────────────────────
function AllocationRing({ pct, size=96, schoolKey, yearKey }) {
  const arcRef    = useRef(null);
  const r         = (size - 14) / 2;
  const circ      = 2 * Math.PI * r;
  const overspent = pct > 1;
  const color     = overspent ? "#DC2626" : pct > 0.92 ? "#B45309" : "#15803D";

  useEffect(() => {
    if (!arcRef.current || typeof gsap === "undefined") return;
    const target = circ * (1 - Math.min(pct, 1));
    gsap.fromTo(arcRef.current,
      { strokeDashoffset: circ },
      { strokeDashoffset: target, duration: 1.5, ease: "expo.out", delay: 0.25 }
    );
  }, [schoolKey, yearKey]);

  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8EFF7" strokeWidth={11} />
        <circle ref={arcRef} cx={size/2} cy={size/2} r={r}
          fill="none" stroke={color} strokeWidth={11} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={typeof gsap !== "undefined" ? circ : circ * (1 - Math.min(pct, 1))} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
        <div className="mono" style={{ fontSize:13, fontWeight:700, color, lineHeight:1 }}>
          {fmtPct(Math.min(pct, 9.99))}
        </div>
        <div style={{ fontSize:8.5, color:"var(--muted)", marginTop:2, letterSpacing:".05em", textTransform:"uppercase" }}>used</div>
      </div>
    </div>
  );
}

const PLAN_TEMPLATE_URL = "https://docs.google.com/document/d/1H4lQyzfd9wcbD_SeZYG73cyHikeJfy9X/copy";

function fiscalYearPace(key) {
  const ranges = {
    fy2526: { start: new Date("2025-07-01"), end: new Date("2026-07-01") },
    fy2425: { start: new Date("2024-07-01"), end: new Date("2025-07-01") },
  };
  const r = ranges[key];
  if (!r) return null;
  const total   = r.end - r.start;
  const elapsed = Math.min(Math.max(Date.now() - r.start, 0), total);
  return elapsed / total;
}

function YearColumn({ yearMeta, school, colWidth, animDelay=0 }) {
  const colRef  = useRef(null);
  const fillRef = useRef(null);
  const [showWaiver, setShowWaiver] = React.useState(false);
  const [showOverageWarn, setShowOverageWarn] = React.useState(false);

            color:"#94A3B8", marginBottom:10 }}>Allocations Expected</div>

          <div style={{ fontSize:11, color:"#94A3B8", marginTop:8, lineHeight:1.5 }}>
            Prop 28 funding amounts for FY 2026–27<br/>will be published by CDE in July.

        {/* Plan template link */}

          <div style={{ fontSize:11, fontWeight:700, color:"#64748B", marginBottom:4 }}>Start planning now</div>
          <div style={{ fontSize:11, color:"#94A3B8", marginBottom:12, lineHeight:1.5 }}>
            Use the district template to draft your FY 2026–27 Site Expenditure Plan.
          </div>
          <a href={PLAN_TEMPLATE_URL} target="_blank" rel="noreferrer" style={{
            display:"inline-flex", alignItems:"center", gap:6,
            fontSize:11, fontWeight:700, color:"#1D4ED8",
            textDecoration:"underline", textDecorationColor:"#93C5FD"
          }}>📋 26-27 Plan Template ↗</a>
        </div>
      </div>
    );
  }
  const planFile = (SITE_PLANS[school.id] || {})[key];
  const planUrl  = planFile ? `/plans/${encodeURIComponent(planFile)}` : null;
  const fy2425balance = FY2425_AVAILABLE_BALANCE[school.id];
  const priorYearOverage = (key === "fy2526" && typeof fy2425balance === "number" && fy2425balance < 0)
    ? Math.abs(fy2425balance) : null;
  const data       = school[key];
  const isCurrent  = status === "current";
  const { allocation, totalExp } = data;
  const usagePct   = allocation > 0 ? totalExp / allocation : 0;
  const overspent  = totalExp > allocation;
  const fillColor  = overspent ? "#DC2626" : usagePct > 0.92 ? "#B45309" : "#15803D";

  // Remaining: for FY 2024–25, use spreadsheet column U (Available Balance After
  // A/V Projects) so the figure reflects funds the school actually still has.
  // For other years, fall back to the simple alloc − expenditure.
  const overrideRemaining = key === "fy2425" ? FY2425_AVAILABLE_BALANCE[school.id] : undefined;
  const remaining = (typeof overrideRemaining === "number")
    ? overrideRemaining
    : allocation - totalExp;
  const remainingColor = remaining < 0
    ? "var(--red)"
    : remaining < allocation * 0.05
      ? "var(--amber)"
      : "var(--green)";

  const sc = isCurrent
    ? { bg:"var(--blue-soft)",  text:"var(--blue)",  dot:"#1D4ED8", anim:true  }
    : { bg:"var(--green-soft)", text:"var(--green)", dot:"#15803D", anim:false };

  // Spending pace (current year only)
  const pacePct = isCurrent ? fiscalYearPace(key) : null;
  const paceGap = pacePct !== null ? usagePct - pacePct : null;
  const paceVerdict = paceGap === null ? null
    : paceGap >  0.08 ? { label:"Ahead of pace",  color:"var(--green)", bg:"var(--green-soft)" }
    : paceGap < -0.12 ? { label:"Behind pace",     color:"var(--red)",   bg:"var(--red-soft)"   }
    :                   { label:"On track",         color:"var(--green)", bg:"var(--green-soft)" };

  // Year-over-year allocation delta
  const prevKey    = key === "fy2526" ? "fy2425" : key === "fy2425" ? "fy2324" : null;
  const prevAlloc  = prevKey ? (school[prevKey]?.allocation ?? null) : null;
  const allocDelta = prevAlloc !== null ? allocation - prevAlloc : null;

  useEffect(() => {
    if (!colRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(colRef.current,
      { opacity:0, y:36 },
      { opacity:1, y:0, duration:1.1, ease:"expo.out", delay:animDelay }
    );
  }, [school.id]);

  useEffect(() => {
    if (!fillRef.current || typeof gsap === "undefined") return;
    gsap.fromTo(fillRef.current,
      { scaleX:0 },
      { scaleX:Math.min(usagePct, 1), duration:1.6, ease:"expo.out",
        transformOrigin:"left center", delay:animDelay + 0.4 }
    );
  }, [school.id, key]);

  return (
    <div ref={colRef} style={{ width:colWidth, flexShrink:0, opacity: typeof gsap !== "undefined" ? 0 : 1 }}>

      {/* Year header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:20 }}>

            <a href={planUrl} target="_blank" rel="noreferrer" style={{
              fontSize:10, fontWeight:700, letterSpacing:".04em", color:"#1D4ED8",
              textDecoration:"underline", textDecorationColor:"#93C5FD"
            }}>📄 Site Expenditure Plan</a>
          )}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, borderRadius:999, padding:"5px 12px",
          background:sc.bg, fontSize:10.5, fontWeight:600, color:sc.text, flexShrink:0 }}>
          <span className={sc.anim ? "live-dot" : ""} style={{ width:5, height:5, borderRadius:"50%", background:sc.dot, display:"inline-block" }} />
          {isCurrent ? "Live" : "Final"}
        </div>
      </div>

      {/* Big ring + allocation */}
      <div className="card" style={{ padding:"28px 24px", marginBottom:14, display:"flex", flexDirection:"column", alignItems:"center", gap:18 }}>
        <AllocationRing pct={usagePct} size={120} schoolKey={school.id} yearKey={key} />

          <div className="serif" style={{ fontSize:32, lineHeight:1, color:"var(--ink)" }}>
            <AnimNum value={allocation} format={fmt$} />
          </div>
          {allocDelta !== null && (
            <div style={{ marginTop:7, fontSize:11, fontWeight:700,
              color: allocDelta >= 0 ? "var(--green)" : "var(--red)" }}>
              {allocDelta >= 0 ? "▲" : "▼"} {fmt$(Math.abs(allocDelta))}
              <span style={{ color:"var(--muted)", fontWeight:400, marginLeft:5 }}>vs prior year</span>
            </div>
          )}
        </div>
      </div>

      {/* Expended / Remaining */}
      <div className="card" style={{ overflow:"hidden", marginBottom:14 }}>

          <div style={{ padding:"18px 20px" }}>

          )}

}

// ── Sign-In screen ───────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [shaking,  setShaking]  = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const shake = () => {
    setShaking(true);
    setTimeout(() => setShaking(false), 450);
  };

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    const res = await API.post("/api/login", {
      email: email.trim().toLowerCase(),
      password,
    });
    setLoading(false);
    if (!res.ok) {
      setError(res.data.error || "Sign-in failed.");
      shake();
      return;
    }
    sessionStorage.setItem("clearams_token", res.data.token);
    onLogin(res.data);
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <ClearAMSLogo height={32} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      {/* GUSD VAPA logo + app name */}
      <div className="text-center" style={{ padding:"20px 16px 0" }}>
        <img src="/GUSD%20VAPA%20Logo.png" alt="GUSD Visual and Performing Arts"
          style={{ width:120, height:120, objectFit:"contain", display:"block", margin:"0 auto" }}/>
        <h2 className="serif" style={{ fontSize:38, lineHeight:1.05, color:"var(--ink)", marginTop:14, letterSpacing:"-.02em" }}>
          ClearAMS
        </h2>
      </div>

      {/* VAPA hero image */}
      <div style={{ display:"flex", justifyContent:"center", padding:"16px 16px 0" }}>
        <img src="/vapa-icon-clean.png" alt="" style={{ width:400, maxWidth:"100%", display:"block" }}/>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:360 }}>
          <div className="text-center mb-8">
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              This application uses a unique username and password combination (not standard GUSD or GUSD Google credentials) provided by the GUSD Visual and Performing Arts Department.
            </p>
          </div>

          <form onSubmit={submit}

            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Email

                <input type="email" value={email} onChange={e => { setEmail(e.target.value); setError(null); }}

                  className="focus-ring" style={inputStyle} />
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>

// ── Reset-password screen (forced on first login) ─────────────────────────────
function ResetPasswordScreen({ email, onDone }) {
  const [newPw,    setNewPw]    = useState("");
  const [confirm,  setConfirm]  = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);

  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14, borderRadius:8,
    border:"1px solid var(--line)", background:"white", color:"var(--ink)",
    outline:"none", fontFamily:"inherit", display:"block", boxSizing:"border-box",
  };

  const submit = async (e) => {
    e.preventDefault();
    if (newPw !== confirm) { setError("Passwords do not match."); return; }
    if (newPw.length < 8)  { setError("Password must be at least 8 characters."); return; }
    setLoading(true);
    setError(null);
    const res = await API.post("/api/change-password", { newPassword: newPw, confirmPassword: confirm });
    setLoading(false);
    if (!res.ok) { setError(res.data.error || "Failed to update password."); return; }
    onDone();
  };

  return (
    <div className="min-h-screen grid-bg flex flex-col" style={{ background:"var(--surface)" }}>
      <div className="hairline-b" style={{ background:"white" }}>
        <div className="mx-auto px-10 py-4 flex items-center gap-3" style={{ maxWidth:900 }}>
          <ClearAMSLogo height={32} />
          <span style={{ fontSize:15, fontWeight:700, letterSpacing:"-.015em" }}>ClearAMS</span>
          <span style={{ fontSize:12, color:"var(--muted)" }}>Arts & Music in Schools (Prop 28) Budget Visualizer · Glendale Unified School District</span>
        </div>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center px-8">
        <div className="fade-up" style={{ width:"100%", maxWidth:380 }}>
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-full mb-4"
              style={{ background:"var(--blue-soft)", border:"1px solid #BFDBFE" }}>
              <I name="KeyRound" size={22} className="" style={{ color:"var(--blue)" }} />
            </div>
            <h2 className="serif" style={{ fontSize:30, lineHeight:1.1, color:"var(--ink)" }}>
              Set your password
            </h2>
            <p style={{ fontSize:13, color:"var(--muted)", marginTop:8, lineHeight:1.6 }}>
              You're signed in as <strong style={{ color:"var(--ink)" }}>{email}</strong>.<br/>
              Choose a new password to continue.
            </p>
          </div>

          <form onSubmit={submit}>
            <div className="card px-6 py-6" style={{ display:"flex", flexDirection:"column", gap:16 }}>

              {error && (
                <div className="flex items-start gap-2.5 px-4 py-3 rounded-lg"
                  style={{ background:"var(--red-soft)", border:"1px solid #FECACA" }}>
                  <I name="AlertCircle" size={14} style={{ color:"var(--red)", flexShrink:0, marginTop:1 }} />
                  <span style={{ fontSize:12, color:"var(--red)", lineHeight:1.5 }}>{error}</span>
                </div>
              )}

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  New Password
                </label>
                <div style={{ position:"relative" }}>
                  <input type={showPw ? "text" : "password"} value={newPw}
                    onChange={e => { setNewPw(e.target.value); setError(null); }}
                    placeholder="Min 8 characters" autoFocus required minLength={8}
                    className="focus-ring" style={{ ...inputStyle, paddingRight:40 }} />
                  <button type="button" onClick={() => setShowPw(p => !p)}
                    style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                      background:"none", border:"none", cursor:"pointer", color:"var(--muted)", padding:4 }}>
                    <I name={showPw ? "EyeOff" : "Eye"} size={15} />
                  </button>
                </div>
              </div>

              <div>
                <label style={{ fontSize:11.5, fontWeight:600, color:"var(--ink-2)", display:"block", marginBottom:6 }}>
                  Confirm Password
                </label>
                <input type={showPw ? "text" : "password"} value={confirm}
                  onChange={e => { setConfirm(e.target.value); setError(null); }}
                  placeholder="Re-enter password" required
                  className="focus-ring" style={inputStyle} />
              </div>

              <button type="submit" disabled={loading} className="btn btn-primary focus-ring"
                style={{ justifyContent:"center", marginTop:4, padding:"11px 0", fontSize:14, width:"100%" }}>
                {loading ? "Saving…" : "Set Password & Continue"}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div className="hairline-t py-5 text-center" style={{ fontSize:11, color:"var(--muted)", background:"white" }}>
        Glendale Unified School District · <a href="https://www.gusd.net/arts" target="_blank" rel="noopener noreferrer" style={{ color:"inherit", textDecoration:"none" }}>www.gusd.net/arts</a> · {new Date().getFullYear()}
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("loading");
  const [schoolIds, setSchoolIds] = useState([]);
  const [schoolId,  setSchoolId]  = useState(null);
  const [user,      setUser]      = useState(null);

  const applySession = (data) => {
    const ids = data.schoolIds?.length ? data.schoolIds
               : data.schoolId        ? [data.schoolId]
               : [];
    setSchoolIds(ids);
    setSchoolId(ids[0] ?? null);
    setUser(data);
  };

  // Restore session on load
  useEffect(() => {
    const token = sessionStorage.getItem("clearams_token");
    if (!token) { setView("login"); return; }
    API.get("/api/me").then(res => {
      if (!res.ok) { sessionStorage.removeItem("clearams_token"); setView("login"); return; }
      applySession(res.data);
      setView(res.data.mustResetPassword ? "reset" : "dashboard");
    });
  }, []);

  const onLogin = useCallback((data) => {
    applySession(data);
    setView(data.mustResetPassword ? "reset" : "dashboard");
  }, []);

  const onPasswordReset = useCallback(() => {
    setUser(prev => ({ ...prev, mustResetPassword: false }));
    setView("dashboard");
  }, []);

  const signOut = useCallback(async () => {
    await API.post("/api/logout");
    sessionStorage.removeItem("clearams_token");
    setView("login");
    setSchoolIds([]);
    setSchoolId(null);
    setUser(null);
  }, []);

  if (view === "loading") return (
    <div className="min-h-screen flex items-center justify-center" style={{ background:"white" }}>
      <div style={{ color:"var(--muted)", fontSize:13 }}>Loading…</div>
    </div>
  );

  if (view === "dashboard") return <Dashboard schoolId={schoolId} schoolIds={schoolIds} onSchoolChange={setSchoolId} user={user} onSignOut={signOut} />;
  if (view === "reset")     return <ResetPasswordScreen email={user?.email} onDone={onPasswordReset} />;
  return <LoginScreen onLogin={onLogin} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
